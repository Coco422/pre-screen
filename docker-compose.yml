services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: prescreen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prescreen"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -qx PONG"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo "waiting for minio"
          sleep 2
        done

        /usr/bin/mc mb --ignore-existing local/resumes
        echo "minio bootstrap complete"

  judge0-db:
    profiles: ["judge0-local"]
    image: postgres:16
    env_file:
      - ./infra/judge0/judge0.conf
    ports:
      - "5433:5432"
    volumes:
      - judge0_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0 -d judge0"]
      interval: 10s
      timeout: 5s
      retries: 12

  judge0-redis:
    profiles: ["judge0-local"]
    image: redis:7
    env_file:
      - ./infra/judge0/judge0.conf
    command:
      - bash
      - -c
      - docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a judge0redis ping | grep -qx PONG"]
      interval: 10s
      timeout: 5s
      retries: 12

  judge0:
    profiles: ["judge0-local"]
    image: judge0/judge0:1.13.1
    platform: linux/amd64
    depends_on:
      - judge0-db
      - judge0-redis
    env_file:
      - ./infra/judge0/judge0.conf
    volumes:
      - ./infra/judge0/judge0.conf:/judge0.conf:ro
    privileged: true
    ports:
      - "2358:2358"
    healthcheck:
      test:
        [
          "CMD",
          "ruby",
          "-rnet/http",
          "-ruri",
          "-e",
          "exit(Net::HTTP.get_response(URI('http://127.0.0.1:2358/languages')).is_a?(Net::HTTPSuccess) ? 0 : 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  judge0-workers:
    profiles: ["judge0-local"]
    image: judge0/judge0:1.13.1
    platform: linux/amd64
    command:
      - ./scripts/workers
    depends_on:
      - judge0-db
      - judge0-redis
    env_file:
      - ./infra/judge0/judge0.conf
    volumes:
      - ./infra/judge0/judge0.conf:/judge0.conf:ro
    privileged: true

  judge0-init:
    profiles: ["judge0-local"]
    image: postgres:16
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0:
        condition: service_healthy
    env_file:
      - ./infra/judge0/judge0.conf
    entrypoint:
      - /bin/sh
      - /bootstrap/bootstrap.sh
    volumes:
      - ./infra/judge0/bootstrap.sh:/bootstrap/bootstrap.sh:ro
      - ./infra/judge0/customize-languages.sql:/bootstrap/customize-languages.sql:ro

  gateway:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    environment:
      APP_ENV: local
      POSTGRES_DSN: postgresql+psycopg://postgres:postgres@postgres:5432/prescreen
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_RESUMES: resumes
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: http://172.16.99.204:3398
      AI_MODEL: qwen3.6-27b
      JUDGE0_BASE_URL: ${JUDGE0_BASE_URL:-http://192.168.100.189:2360}
      # postgres: durable tasks/uploads/candidates (survives gateway restart)
      # memory: in-process demo_store seed (lost on restart)
      STORE_BACKEND: ${STORE_BACKEND:-postgres}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data = json.load(urllib.request.urlopen('http://127.0.0.1:8000/healthz')); assert data == {'service': 'gateway', 'status': 'ok'}",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  nginx:
    build:
      context: .
      dockerfile: infra/docker/nginx.Dockerfile
    depends_on:
      - gateway
      - web
    ports:
      - "80:80"

volumes:
  postgres_data:
  minio_data:
  judge0_db_data:
