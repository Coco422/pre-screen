services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: prescreen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo "waiting for minio"
          sleep 2
        done

        /usr/bin/mc mb --ignore-existing local/resumes
        echo "minio bootstrap complete"
        exec tail -f /dev/null

  judge0-db:
    image: postgres:16
    env_file:
      - ./infra/judge0/judge0.conf
    ports:
      - "5433:5432"
    volumes:
      - judge0_db_data:/var/lib/postgresql/data

  judge0-redis:
    image: redis:7
    env_file:
      - ./infra/judge0/judge0.conf
    command:
      - bash
      - -c
      - docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"
    ports:
      - "6380:6379"

  judge0:
    image: judge0/judge0:1.13.1
    platform: linux/amd64
    depends_on:
      - judge0-db
      - judge0-redis
    env_file:
      - ./infra/judge0/judge0.conf
    volumes:
      - ./infra/judge0/judge0.conf:/judge0.conf:ro
    privileged: true
    ports:
      - "2358:2358"

  judge0-workers:
    image: judge0/judge0:1.13.1
    platform: linux/amd64
    command:
      - ./scripts/workers
    depends_on:
      - judge0-db
      - judge0-redis
    env_file:
      - ./infra/judge0/judge0.conf
    volumes:
      - ./infra/judge0/judge0.conf:/judge0.conf:ro
    privileged: true

volumes:
  postgres_data:
  minio_data:
  judge0_db_data:
