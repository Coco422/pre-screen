# Judge0 local development configuration.
# This file is mounted into the Judge0 containers at /judge0.conf and is also
# reused as the env file for the dedicated Postgres and Redis sidecars.

ENABLE_WAIT_RESULT=true

REDIS_HOST=judge0-redis
REDIS_PORT=6379
REDIS_PASSWORD=judge0redis

POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0

# Ubuntu 24.04 and modern Docker hosts use cgroup v2 by default.
# These flags keep Judge0 on isolate's non-cgroup execution path.
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=true
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=true

# Roomier defaults help managed runtimes such as Node.js, while MAX_MEMORY_LIMIT
# is kept high enough for Java profiles that need larger virtual address space.
MEMORY_LIMIT=1048576
MAX_MEMORY_LIMIT=4194304
CPU_TIME_LIMIT=8
MAX_CPU_TIME_LIMIT=20
WALL_TIME_LIMIT=15
MAX_WALL_TIME_LIMIT=30
